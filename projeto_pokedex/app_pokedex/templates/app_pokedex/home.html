{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Pokédex</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'app_pokedex/css/style.css' %}">
  <link rel="stylesheet" href="{% static 'app_pokedex/css/animations.css' %}">
</head>
<body>

  <div class="scanline"></div>
  <div class="noise"></div>

  <header class="header">
      <div class="header-inner">
        <div class="logo-dot"></div>
        <h1 class="logo-text">POKÉDEX</h1>
        <div class="logo-dot"></div>
        <div class="header-auth">
          {% if request.user.is_authenticated %}
            <span class="auth-user">{{ request.user.username }}</span>
            <a href="{% url 'logout' %}" class="btn btn-danger">Sair</a>
          {% else %}
            <a href="{% url 'login' %}" class="btn btn-primary">Entrar</a>
            <a href="{% url 'registro' %}" class="btn btn-accent">Cadastrar</a>
          {% endif %}
        </div>
      </div>
  </header>

  <main class="container">

    <section class="card" id="section-listar">
      <div class="card-label">01</div>
      <h2 class="card-title">Listar Pokémons</h2>
      <button class="btn btn-primary" onclick="window.location.href='/pokemons/'">
      <span class="btn-icon">▶</span> Buscar todos
      </button>
      </button>
      <div id="resultado-todos" class="resultado-grid"></div>
    </section>

    <section class="card" id="section-criar">
      <div class="card-label">02</div>
      <h2 class="card-title">Criar Pokémon</h2>
      <div class="form-grid">
        <input class="input" type="text" id="criar-name" placeholder="Nome">
        <input class="input" type="file" id="criar-sprites">
        <input class="input" type="text" id="criar-type1" placeholder="Tipo 1">
        <input class="input" type="text" id="criar-type2" placeholder="Tipo 2 (opcional)">
        <input class="input" type="number" id="criar-hp" placeholder="HP">
        <input class="input" type="number" id="criar-attack" placeholder="Ataque">
        <input class="input" type="number" id="criar-defense" placeholder="Defesa">
        <input class="input" type="number" id="criar-speed" placeholder="Velocidade">
        <input class="input input-full" type="text" id="criar-abilities" placeholder="Habilidades">
      </div>
      <button class="btn btn-accent" onclick="criarPokemon()">
        <span class="btn-icon">✦</span> Criar
      </button>
      <div id="resultado-criar"></div>
    </section>

    <section class="card" id="section-meus" style="grid-column: 1 / -1;">
      <div class="card-label">★</div>
      <h2 class="card-title">Meus Pokémons</h2>
      <div class="resultado-grid" id="meus-pokemons">
        <p class="empty-msg">Carregando...</p>
      </div>
    </section>

    <section class="card" id="section-editar">
      <div class="card-label">03</div>
      <h2 class="card-title">Editar Pokémon</h2>
      <div class="form-grid">
        <input class="input input-full" type="text" id="editar-id" placeholder="ID do Pokémon (UUID)">
        <input class="input" type="text" id="editar-name" placeholder="Nome">
        <input class="input" type="text" id="editar-type1" placeholder="Tipo 1">
        <input class="input" type="text" id="editar-type2" placeholder="Tipo 2 (opcional)">
        <input class="input" type="number" id="editar-hp" placeholder="HP">
        <input class="input" type="number" id="editar-attack" placeholder="Ataque">
        <input class="input" type="number" id="editar-defense" placeholder="Defesa">
        <input class="input" type="number" id="editar-speed" placeholder="Velocidade">
        <input class="input input-full" type="text" id="editar-abilities" placeholder="Habilidades">
      </div>
      <button class="btn btn-warning" onclick="editarPokemon()">
        <span class="btn-icon">✎</span> Editar
      </button>
      <div id="resultado-editar"></div>
    </section>

    <section class="card" id="section-deletar">
      <div class="card-label">04</div>
      <h2 class="card-title">Deletar Pokémon</h2>
      <div class="form-grid">
        <input class="input input-full" type="text" id="deletar-id" placeholder="ID do Pokémon (UUID)">
      </div>
      <button class="btn btn-danger" onclick="deletarPokemon()">
        <span class="btn-icon">✕</span> Deletar
      </button>
      <div id="resultado-deletar"></div>
    </section>
  </main>

  <script>
    const BASE_URL = '/api/pokebag/'

    function mostrar(id, data) {
    }

    async function criarPokemon() {
      const BASE_URL = '/api/pokebag/';
      const NAME = document.getElementById('criar-name').value;
      const SPRITES = document.getElementById('criar-sprites').files[0];
      const TYPE1 = document.getElementById('criar-type1').value;
      const TYPE2 = document.getElementById('criar-type2').value;
      const HP = document.getElementById('criar-hp').value;
      const ATTACK = document.getElementById('criar-attack').value;
      const DEFENSE = document.getElementById('criar-defense').value;
      const SPEED = document.getElementById('criar-speed').value;
      const ABILITIES = document.getElementById('criar-abilities').value;

      const FORM_DATA = new FormData();
      FORM_DATA.append('name', NAME);
      if (SPRITES) {
        FORM_DATA.append('sprite_img', SPRITES);
      }
      FORM_DATA.append('type1', TYPE1);
      FORM_DATA.append('type2', TYPE2);
      FORM_DATA.append('hp', HP);
      FORM_DATA.append('attack', ATTACK);
      FORM_DATA.append('defense', DEFENSE);
      FORM_DATA.append('speed', SPEED);
      FORM_DATA.append('abilities', ABILITIES);

      const CSRF = document.cookie.split('; ').find(row => row.startsWith('csrftoken=')).split('=')[1];
      const RESPONSE = await fetch(BASE_URL, { method: 'POST', body: FORM_DATA, headers: { 'X-CSRFToken': CSRF } });
      const DATA = await RESPONSE.json();
      window.location.href = `/pokemon/${DATA.id}/`;
    }

    async function editarPokemon() {
      const ID = document.getElementById('editar-id').value;
      const NAME = document.getElementById('editar-name').value;
      const TYPE1 = document.getElementById('editar-type1').value;
      const TYPE2 = document.getElementById('editar-type2').value;
      const HP = document.getElementById('editar-hp').value;
      const ATTACK = document.getElementById('editar-attack').value;
      const DEFENSE = document.getElementById('editar-defense').value;
      const SPEED = document.getElementById('editar-speed').value;
      const ABILITIES = document.getElementById('editar-abilities').value;

      const FORM_DATA = new FormData();
      FORM_DATA.append('id', ID);
      FORM_DATA.append('name', NAME);
      FORM_DATA.append('type1', TYPE1);
      FORM_DATA.append('type2', TYPE2);
      FORM_DATA.append('hp', HP);
      FORM_DATA.append('attack', ATTACK);
      FORM_DATA.append('defense', DEFENSE);
      FORM_DATA.append('speed', SPEED);
      FORM_DATA.append('abilities', ABILITIES);

      const CSRF = document.cookie.split('; ').find(row => row.startsWith('csrftoken=')).split('=')[1];
      const RESPONSE = await fetch(`${BASE_URL}${ID}/`, { method: 'PATCH', body: FORM_DATA, headers: { 'X-CSRFToken': CSRF } });
      const DATA = await RESPONSE.json();
    }

    async function deletarPokemon() {
      const BASE_URL = '/api/pokebag/';
      const ID = document.getElementById('deletar-id').value;
      const CSRF = document.cookie.split('; ').find(row => row.startsWith('csrftoken=')).split('=')[1];
      const RES = await fetch(`${BASE_URL}${ID}/`, { method: 'DELETE', headers: { 'X-CSRFToken': CSRF } });
      if (RES.status === 204) {
        alert('Pokémon deletado com sucesso!');
      }
    }

    // ─── MEUS POKÉMONS ───
    async function carregarMeusPokemons() {
      const container = document.getElementById('meus-pokemons');
      const res = await fetch(BASE_URL);
      if (!res.ok) {
        container.innerHTML = '<p class="empty-msg">Faça login para ver seus pokémons.</p>';
        return;
      }
      const data = await res.json();
      const pokemons = data.results || data;
      if (!pokemons.length) {
        container.innerHTML = '<p class="empty-msg">Nenhum pokémon cadastrado ainda.</p>';
        return;
      }
      container.innerHTML = pokemons.map(p => `
        <a href="/pokemon/${p.id}/" class="pokemon-card">
          ${p.sprite_img ? `<img src="${p.sprite_img}" alt="${p.name}">` : ''}
          <span class="pokemon-name">${p.name}</span>
          <span class="pokemon-type">${p.type1}${p.type2 ? ' / ' + p.type2 : ''}</span>
        </a>
      `).join('');
    }

    carregarMeusPokemons();
  </script>

</body>
</html>
