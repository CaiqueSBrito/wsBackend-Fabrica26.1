{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Pokédex — Todos os Pokémons</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'app_pokedex/css/style.css' %}">
  <link rel="stylesheet" href="{% static 'app_pokedex/css/animations.css' %}">
</head>
<body>

  <div class="scanline"></div>
  <div class="noise"></div>

  <header class="header">
    <div class="header-inner header-details">
      <a href="/" class="back-btn">◀ Voltar</a>
      <h1 class="logo-text header-title">TODOS OS POKÉMONS</h1>
      <div class="logo-dot"></div>
      <div class="logo-dot"></div>
    </div>
  </header>

  <main class="page">

    <div id="loading-state" style="text-align:center; padding: 80px 0;">
      <span class="loading"></span>
      <p style="font-family: 'Press Start 2P', monospace; font-size: 9px; color: #555; margin-top: 20px; line-height: 2;">Carregando pokémons...</p>
    </div>

    <div id="lista-pokemons" class="resultado-grid" style="display:none;"></div>
    <div class="paginacao">
      <button class="btn btn-primary" id="btn-anterior">◀ Anterior</button>
      <button class="btn btn-primary" id="btn-proximo">Próximo ▶</button>
    </div>

  </main>

  <script>
    let offset = 0;
    const limit = 20;

    async function carregarDaApi() {
      const res = await fetch(`/poke_list/?limit=${limit}&offset=${offset}`);
      const data = await res.json();
      return data;
    }

    function renderizar(pokemons) {
      const container = document.getElementById('lista-pokemons');
      const loading = document.getElementById('loading-state');

      container.innerHTML = '';

      pokemons.forEach(pokemon => {
        const card = document.createElement('a');
        card.href = `/pokemons/${pokemon.id}/`;
        card.className = 'pokemon-card';
        card.innerHTML = `
          ${pokemon.sprite
            ? `<img src="${pokemon.sprite}" alt="${pokemon.name}">`
            : `<div class="pokemon-no-img">?</div>`
          }
          <span class="pokemon-name">${pokemon.name}</span>
          <span class="pokemon-type">#${String(pokemon.id).padStart(4, '0')}</span>
        `;
        container.appendChild(card);
      });

      loading.style.display = 'none';
      container.style.display = 'grid';
    }

    function atualizarBotoes(count) {
      document.getElementById('btn-anterior').disabled = offset === 0;
      document.getElementById('btn-proximo').disabled = offset + limit >= count;
    }

    document.getElementById('btn-proximo').onclick = async () => {
      offset += limit;
      const data = await carregarDaApi();
      renderizar(data.results);
      atualizarBotoes(data.count);
    };

    document.getElementById('btn-anterior').onclick = async () => {
      offset -= limit;
      const data = await carregarDaApi();
      renderizar(data.results);
      atualizarBotoes(data.count);
    };

    async function init() {
      const data = await carregarDaApi();
      renderizar(data.results);
      atualizarBotoes(data.count);
    }

    init();
  </script>

</body>
</html>
