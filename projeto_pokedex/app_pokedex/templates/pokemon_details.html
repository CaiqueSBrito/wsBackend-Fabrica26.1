<h1>{{ pokemon.name }}</h1>
<img src="{{ pokemon.sprite_image }}" alt="{{ pokemon.name }}">
<p>HP: {{ pokemon.hp }}</p>
<p>Attack: {{ pokemon.attack }}</p>
<p>Defense: {{ pokemon.defense }}</p>
<p>Speed: {{ pokemon.speed }}</p>
<p>Type: {{ pokemon.type1 }} {{ pokemon.type2 }}</p>
<p>Abilities: {{ pokemon.abilities }}</p>
